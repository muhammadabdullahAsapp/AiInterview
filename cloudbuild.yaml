steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'BuildBackend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}', '-f', 'backend/Dockerfile', 'backend']

  # 2. Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '--region'
      - '${_DEPLOY_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '8Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '3600'
      - '--cpu-boost'
      - '--session-affinity'

substitutions:
  _SERVICE_NAME: aiinterview
  _DEPLOY_REGION: europe-west1

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
